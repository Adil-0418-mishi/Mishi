<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
body{
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial,sans-serif;
overflow:hidden;
}

.box{
text-align:center;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.2);
}

h1{
color:#ff4d6d;
font-size:38px;
}

p{
font-size:22px;
margin-bottom:30px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yes{
background:#28a745;
color:white;
}

#no{
background:#dc3545;
color:white;
position:absolute;
}

</style>
</head>

<body>

<div class="box">
<h1>🥺 I'm Sorry</h1>
<p>Kya Tum Ne Mujhe Maaf Kiya? ❤️</p>

<button id="yes">Yes ❤️</button>
<button id="no">No 💔</button>

</div>

<script>

let no=document.getElementById("no");

no.addEventListener("click",function(){

let x=Math.random()*(window.innerWidth-120);

let y=Math.random()*(window.innerHeight-60);

no.style.left=x+"px";

no.style.top=y+"px";

});

document.getElementById("yes").onclick=function(){

window.location.href="thankyou.html";

}

</script>

</body>
  </html>
