<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial,sans-serif;
overflow:hidden;
}

.box{
text-align:center;
color:white;
}

h1{
font-size:50px;
margin:0;
}

h2{
font-size:30px;
margin-top:20px;
}

.heart{
position:absolute;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="box">
<h1>❤️ Thank You Yaar ❤️</h1>

<h2>Love You Meri Jaan 🥹💖</h2>

<p>Thank you mujhe maaf karne ke liye. ❤️</p>
</div>

<script>

function heart(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},6000);

}

setInterval(heart,300);

</script>

</body>
  </html>
